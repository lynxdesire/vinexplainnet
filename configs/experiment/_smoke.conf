run_name = "vinexplainnet_smoke"
take_dir = "takes"

model {
  channels = [8, 12, 16, 24]
  stem = 8
  attention_dim = 16
  hidden = 32
  use_speckle = true
  use_local = true
  use_regional = true
  use_global = true
  use_fusion = true
}

data {
  name = "kermany"
  classes = ["CNV", "DME", "Drusen", "Normal"]
  image_size = 32
  n_train = 16
  n_val = 8
  batch_size = 8
  manifest = ""
}

train {
  lr = 1e-3
  min_lr = 1e-6
  weight_decay = 1e-4
  stage2_epochs = 1
  stage3_epochs = 1
  lambda_cls = 1.0
  lambda_e = 0.1
  lambda_r = 5e-4
  boundary_beta = 1.0
  seed = 1234
  max_steps = 2
  device = "cpu"
}

edge {
  prune_threshold_ratio = 0.3
  quant_bits = 8
}

ass {
  sigma_s = 10.0
  sigma_r = 0.1
  kernel = 5
}
