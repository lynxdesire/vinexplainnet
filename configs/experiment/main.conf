run_name = "vinexplainnet_main"
take_dir = "takes"

include "../model/vinexplainnet.conf"
include "../data/kermany.conf"

train {
  lr = 1e-4
  min_lr = 1e-6
  weight_decay = 1e-4
  stage2_epochs = 200
  stage3_epochs = 50
  lambda_cls = 1.0
  lambda_e = 0.1
  lambda_r = 5e-4
  boundary_beta = 1.0
  seed = 1234
  max_steps = 0
  device = "cpu"
}

edge {
  prune_threshold_ratio = 0.3
  quant_bits = 8
}

ass {
  sigma_s = 10.0
  sigma_r = 0.1
  kernel = 5
}
